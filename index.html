<title>FACT — Verified Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ===== デザインシステム (ui-ux-pro-max principles: News/FactCheck / Dark Editorial) ===== */
:root {
  --brand:      #4a9eff;
  --brand-dim:  rgba(74,158,255,0.12);
  --brand-glow: rgba(74,158,255,0.18);

  /* サーフェス階層 */
  --bg:         #080e1e;
  --surface:    #0c1525;
  --surface-2:  #0f1e35;
  --surface-3:  #132240;

  /* ボーダー */
  --border:     #1a2a4a;
  --border-2:   #2a4272;

  /* テキスト (WCAG AA 4.5:1 以上) */
  --text-1:     #e0e6f0;   /* primary  ≈ 12:1 */
  --text-2:     #8899b0;   /* secondary ≈ 5.5:1 */
  --text-3:     #5a6a80;   /* tertiary  ≈ 3.5:1 (非クリティカル用途のみ) */

  /* ステータス */
  --success:    #4caf50;
  --warn:       #ff9800;
  --danger:     #ef5350;

  /* トランジション (article checklist: 150–300ms) */
  --t-fast:     150ms ease;
  --t-mid:      250ms ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text-1); font-family: 'Noto Sans JP', sans-serif; display: flex; justify-content: center; }
::-webkit-scrollbar { display: none; }

/* フォーカスリング (キーボードナビ / a11y) */
:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 4px; }

#app { width: 100%; max-width: 400px; min-height: 100vh; display: flex; flex-direction: column; position: relative; background: var(--bg); }

/* ヘッダー */
#header {
  background: rgba(12,21,37,0.85);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10;
  flex-shrink: 0;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 1px 0 var(--border), 0 4px 16px rgba(0,0,0,0.3);
}
.logo { font-family: monospace; font-weight: 900; font-size: 18px; color: var(--brand); letter-spacing: 2px; }
.logo-sub { font-size: 10px; color: var(--brand); letter-spacing: 1px; opacity: 0.55; margin-left: 8px; }
.sensitivity-badge { margin-left: auto; font-size: 10px; color: var(--text-3); font-family: monospace; }

/* コンテンツ */
#content { flex: 1; overflow-y: auto; padding-bottom: 70px; }

/* 下部ナビ */
#bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 400px;
  background: rgba(12,21,37,0.92);
  border-top: 1px solid var(--border);
  display: flex; z-index: 50;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
}
.nav-btn {
  flex: 1; padding: 9px 2px 7px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  border: none; background: none; cursor: pointer;
  border-top: 2px solid transparent;
  transition: border-color var(--t-fast), background var(--t-fast);
}
.nav-btn:hover { background: var(--brand-dim); }
.nav-btn:active { background: var(--brand-glow); }
.nav-btn.active { border-top-color: var(--brand); background: var(--brand-dim); }
.nav-btn.active .nav-label { color: var(--brand); font-weight: 600; }
.nav-icon { font-size: 16px; }
.nav-btn:not(.active) .nav-icon { filter: grayscale(1) opacity(0.45); }
.nav-label { font-size: 8.5px; color: var(--text-2); letter-spacing: 0.3px; }

/* 共通 */
.section { padding: 14px 14px 0; }
.section-title {
  font-size: 10px; color: var(--brand); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 10px; font-family: monospace;
  padding-left: 8px;
  border-left: 2px solid var(--brand);
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
.card.clickable { cursor: pointer; transition: border-color var(--t-fast), box-shadow var(--t-fast), background var(--t-fast); }
.card.clickable:hover { border-color: var(--border-2); box-shadow: 0 0 0 1px var(--brand-dim), 0 4px 16px rgba(0,0,0,0.3); background: var(--surface-2); }
.card.clickable:active { background: var(--surface-2); transform: scale(0.992); transition: transform 0.1s, background 0.1s; }

/* カテゴリリスト（1列） */
.cat-grid {
  display: flex; flex-direction: column; gap: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; margin: 8px 14px;
}
.cat-card {
  background: transparent; border: none;
  border-bottom: 1px solid var(--border); border-radius: 0;
  padding: 13px 8px; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  box-shadow: none;
  transition: background var(--t-fast);
}
.cat-card:last-child { border-bottom: none; }
.cat-card:hover { background: var(--surface-2); box-shadow: none; border-color: var(--border); }
.cat-card:active { transform: scale(0.99); background: var(--surface-3); }
.cat-card.has-alert { border-color: var(--border); }
.cat-card .cat-icon  { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; margin-bottom: 0; }
.cat-card .cat-name  { flex: 1; font-size: 13px; font-weight: 600; margin-bottom: 0; }
.cat-card .cat-count { font-size: 12px; color: var(--text-2); flex-shrink: 0; }
.cat-card .alert-dot { position: static; font-size: 12px; color: var(--warn); flex-shrink: 0; margin-left: 0; }

/* スコアバー */
.score-bar-wrap { display: flex; align-items: center; gap: 8px; }
.score-bar-track { flex: 1; height: 6px; background: rgba(26,32,53,0.8); border-radius: 99px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.score-val { font-family: monospace; font-size: 13px; font-weight: 700; min-width: 28px; }

/* タグ */
.type-tag { font-size: 10px; padding: 2px 8px; border-radius: 99px; border: 1px solid; display: inline-block; }
.tag-nhk      { color: #5aaeff; background: rgba(74,158,255,0.12); border-color: rgba(74,158,255,0.3); }
.tag-paper    { color: #8BC34A; background: rgba(139,195,74,0.1);  border-color: rgba(139,195,74,0.3); }
.tag-gov      { color: #ff9800; background: rgba(255,152,0,0.1);   border-color: rgba(255,152,0,0.3); }
.tag-academic { color: #c97fe0; background: rgba(156,39,176,0.1);  border-color: rgba(156,39,176,0.3); }

/* アラートバッジ */
.alert-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 4px; font-size: 11px; cursor: pointer; border: 1px solid; transition: opacity var(--t-fast); }
.alert-badge:hover { opacity: 0.8; }

/* タブ */
.tabs { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 10px 14px; font-size: 11px; white-space: nowrap;
  border: none; background: none; color: var(--text-2);
  border-bottom: 2px solid transparent; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: color var(--t-fast), border-color var(--t-fast);
}
.tab-btn:hover { color: var(--text-1); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); font-weight: 700; }

/* 検索ボックス */
.search-box { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
.search-input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; color: var(--text-1); font-size: 14px;
  outline: none; font-family: 'Noto Sans JP', sans-serif;
  transition: border-color var(--t-fast), box-shadow var(--t-fast);
}
.search-input:focus { border-color: rgba(74,158,255,0.5); box-shadow: 0 0 0 3px var(--brand-dim); }
.search-input::placeholder { color: var(--text-3); }
.search-btn {
  padding: 10px 16px; background: var(--brand); border: none; border-radius: 8px;
  color: #fff; font-weight: 700; cursor: pointer; font-size: 13px;
  white-space: nowrap; font-family: 'Noto Sans JP', sans-serif;
  transition: background var(--t-fast), box-shadow var(--t-fast);
}
.search-btn:hover { background: #5aaaff; box-shadow: 0 2px 12px rgba(74,158,255,0.3); }
.search-btn:active { background: #3a8ee0; }

/* パンくず */
.breadcrumb {
  padding: 10px 14px; font-size: 12px; color: var(--text-2);
  display: flex; align-items: center; gap: 4px;
  background: rgba(12,24,48,0.7);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.breadcrumb .crumb-link { color: var(--brand); cursor: pointer; font-weight: 700; padding: 3px 8px; border-radius: 6px; transition: background var(--t-fast); }
.breadcrumb .crumb-link:hover { background: var(--brand-dim); }
.breadcrumb .crumb-current { color: var(--text-1); font-weight: 600; padding: 3px 8px; }
.breadcrumb .crumb-sep { color: var(--border-2); font-size: 14px; font-weight: 300; }
.breadcrumb .back-hint { margin-left: auto; font-size: 10px; color: var(--text-3); display: flex; align-items: center; gap: 3px; }

/* タイムライン */
.timeline-item { display: flex; gap: 12px; margin-bottom: 16px; }
.timeline-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; box-shadow: 0 0 6px currentColor; }
.timeline-line { width: 1px; flex: 1; background: var(--border); margin-top: 4px; margin-left: 4px; }

/* ポップアップ */
#popup-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  z-index: 100; align-items: flex-end; padding-bottom: 0;
}
#popup-overlay.show { display: flex; }
#popup-box {
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: 20px 20px 0 0; padding: 20px;
  width: 100%; max-width: 400px; margin: 0 auto;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.7);
  max-height: 85vh; overflow-y: auto;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes fadeUp   { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* トースト通知 */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface-2); border: 1px solid var(--border-2);
  border-radius: 99px; padding: 10px 20px;
  font-size: 13px; font-weight: 600; color: var(--text-1);
  white-space: nowrap; z-index: 300;
  opacity: 0; transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 水平スクロール */
.hscroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 14px; scrollbar-width: none; }
.hscroll::-webkit-scrollbar { display: none; }
.hscroll-card {
  flex: 0 0 auto; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px; cursor: pointer; text-align: center; min-width: 80px;
  transition: border-color var(--t-fast), background var(--t-fast);
}
.hscroll-card:hover { border-color: var(--border-2); background: var(--surface-2); }

/* range input */
input[type=range] { width: 100%; accent-color: var(--brand); }

/* ソース・視点カード */
.source-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px; margin-bottom: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  transition: border-color var(--t-fast);
}
.perspective-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  transition: border-color var(--t-fast);
}

/* フィルターボタン */
.filter-btn {
  padding: 4px 10px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 99px; font-size: 11px; color: var(--text-2); cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: border-color var(--t-fast), color var(--t-fast), background var(--t-fast);
}
.filter-btn:hover { border-color: var(--border-2); color: var(--text-1); background: var(--surface-2); }
.filter-btn.active { border-color: var(--brand); color: var(--brand); background: var(--brand-dim); }

/* インフォ・警告ボックス */
.info-box { padding: 8px 12px; background: rgba(74,158,255,0.07); border: 1px solid rgba(74,158,255,0.25); border-radius: 8px; font-size: 11px; color: var(--brand); margin-bottom: 14px; line-height: 1.6; }
.warn-box { padding: 8px 10px; background: rgba(255,152,0,0.07); border: 1px solid rgba(255,152,0,0.3); border-radius: 6px; display: flex; align-items: center; gap: 8px; cursor: pointer; margin-top: 10px; transition: background var(--t-fast); }
.warn-box:hover { background: rgba(255,152,0,0.12); }

/* ページ遷移 */
@keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
#content.page-enter { animation: pageIn 0.18s ease-out; }

/* prefers-reduced-motion (article checklist 必須項目) */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .score-bar-fill { transition: none !important; }
}
</style>
</head>

function makeGNewsUrl(domain, query){
  return "https://news.google.com/search?q=" + encodeURIComponent(query + " site:" + domain) + "&hl=ja&gl=JP&ceid=JP:ja";
}

// ドメインごとの自社検索URL
function getOrgSearchUrl(domain, title){
  var q = encodeURIComponent(title);
  var map = {
    'bloomberg.co.jp':   'https://www.bloomberg.co.jp/search?query=' + q,
    'jiji.com':          'https://www.jiji.com/jc/search?q=' + q,
    'nhk.or.jp':         'https://www3.nhk.or.jp/news/nsearch/query.html?q=' + q,
    'nikkei.com':        'https://www.nikkei.com/search?keyword=' + q,
    'asahi.com':         'https://www.asahi.com/search/?q=' + q,
    'yomiuri.co.jp':     'https://www.yomiuri.co.jp/search/?q=' + q,
    'mainichi.jp':       'https://mainichi.jp/search/?q=' + q,
    'sankei.com':        'https://www.sankei.com/search/?q=' + q,
    'tokyo-np.co.jp':    'https://www.tokyo-np.co.jp/search?q=' + q,
    'aljazeera.com':     'https://www.aljazeera.com/search/?q=' + q,
    'reuters.com':       'https://www.reuters.com/search/news?blob=' + q,
    'bbc.com':           'https://www.bbc.com/search?q=' + q,
    'theguardian.com':   'https://www.theguardian.com/search?q=' + q,
    'nytimes.com':       'https://www.nytimes.com/search?query=' + q,
    'japantimes.co.jp':  'https://www.japantimes.co.jp/search/' + q,
    'afpbb.com':         'https://www.afpbb.com/articles/search/?q=' + q,
    'ntv.co.jp':         'https://news.ntv.co.jp/search/' + q,
    'tbs.co.jp':         'https://newsdig.tbs.co.jp/search?q=' + q,
  };
  return map[domain] || (domain ? makeGNewsUrl(domain, title) : 'https://www.google.com/search?q=' + q);
}

// 架空・無効URLを検出して自社検索URLにフォールバック
function getArticleUrl(article, orgName){
  var url = article.url || '';
  var isFake = !url
    || /\/(2026|2027|2028|2029)/.test(url)
    || /202603|202604/.test(url)
    || url.indexOf('news.web.nhk') !== -1
    || /nhk\.or\.jp\/news\/html\//.test(url)   // NHKアーカイブURLは時間経過で消えるため検索にフォールバック
    || url === '#';
  if(isFake){
    // 名前の部分一致でメディアを探す（"Bloomberg Japan" → "Bloomberg" など）
    var media = MEDIA_MASTER.find(function(m){
      return m.name === orgName
        || orgName.indexOf(m.name) >= 0
        || m.name.indexOf(orgName) >= 0;
    });
    var domain = media ? media.domain : '';
    return getOrgSearchUrl(domain, article.title);
  }
  return url;
}

  state.adCountdown = state.adType === 'full' ? 15 : 5;

    state.adCountdown--;

      state.adSkippable = true;

  }, 1000);

function closeAd(){
  if(adTimer){ clearInterval(adTimer); adTimer=null; }
  state.adVisible = false;

    el.innerHTML = '<button onclick="closeAd()" style="padding:8px 20px;background:#fff;border:none;border-radius:99px;font-size:13px;font-weight:700;color:#333;cursor:pointer;font-family:\'Noto Sans JP\',sans-serif">スキップ ›</button>';

// カラーパレット定義
const PALETTES = {
  normal:     { high:"#4CAF50", mid:"#8BC34A", warn:"#FF9800", danger:"#F44336", brand:"#4a9eff", bias:"#FF9800", fact:"#F44336", sns:"#E91E63", old:"#607D8B", conflict:"#9C27B0" },
  protanopia: { high:"#0077BB", mid:"#33BBEE", warn:"#EE7733", danger:"#EE3377", brand:"#0077BB", bias:"#EE7733", fact:"#EE3377", sns:"#AA3377", old:"#BBBBBB", conflict:"#EE7733" },
  tritanopia: { high:"#009E73", mid:"#56B4E9", warn:"#E69F00", danger:"#D55E00", brand:"#56B4E9", bias:"#E69F00", fact:"#D55E00", sns:"#CC79A7", old:"#999999", conflict:"#E69F00" },
  mono:       { high:"#FFFFFF", mid:"#CCCCCC", warn:"#888888", danger:"#444444", brand:"#FFFFFF", bias:"#AAAAAA", fact:"#666666", sns:"#888888", old:"#AAAAAA", conflict:"#777777" },
};
function P(){ return PALETTES[state.colorMode||"normal"]; }
function scoreSymbol(s){ return state.colorMode==="mono"?(s>=90?"◆":s>=70?"▲":s>=50?"■":"✕"):""; }
function brandColor(){ return P().brand; }

// ===== ユーティリティ =====
function scoreColor(s){ const p=P(); return s>=90?p.high:s>=70?p.mid:s>=50?p.warn:p.danger; }
function scoreLabel(s){ return s>=90?"高信頼":s>=70?"信頼":s>=50?"要確認":"注意"; }
function alertColor(t){ const p=P(); return {bias:p.bias,fact:p.fact,sns:p.sns,old:p.old,conflict:p.conflict}[t]||p.warn; }
function alertIcon(t){  return {bias:"📰",fact:"⚠️",sns:"📣",old:"🕐",conflict:"⚖️"}[t]||"⚠️"; }
function typeClass(t){ return {公共放送:"tag-nhk",主要紙:"tag-paper",政府機関:"tag-gov",学術:"tag-academic"}[t]||""; }

function scoreBarHTML(score, sm=false){
  const c=scoreColor(score), h=sm?4:6;
  const sym=scoreSymbol(score);
  const pattern=state.colorMode==="mono"?"repeating-linear-gradient(45deg,"+c+","+c+" 2px,transparent 2px,transparent 6px)":"linear-gradient(90deg,"+c+"66,"+c+")";
  const glow=state.colorMode==="mono"?"":"box-shadow:0 0 6px "+c+"55;";
  return `<div class="score-bar-wrap">
    <div class="score-bar-track" style="height:${h}px">
      <div class="score-bar-fill" style="width:${score}%;background:${pattern};${glow}"></div>
    </div>
    <span class="score-val" style="color:${c};font-size:${sm?11:13}px;text-shadow:0 0 8px ${c}66">${sym}${score}</span>
  </div>`;
}

function alertBadgeHTML(alert){
  if(!alert) return "";
  const c=alertColor(alert.type), icon=alertIcon(alert.type);
  const data=encodeURIComponent(JSON.stringify(alert));
  return `<span class="alert-badge" style="color:${c};background:${c}22;border-color:${c}55" onclick="showPopup(decodeURIComponent('${data}'))">${icon} 注意</span>`;
}

// ===== ポップアップ =====
function showPopup(dataStr){
  let d;
  try{ d = typeof dataStr==="string" ? JSON.parse(dataStr) : dataStr; }catch(e){ return; }
  const c=alertColor(d.type||"bias");
  document.getElementById("popup-icon").textContent = alertIcon(d.type||"bias");
  document.getElementById("popup-type").textContent = d.title || "注意喚起";
  document.getElementById("popup-type").style.color = c;
  document.getElementById("popup-msg").textContent = d.msg||d.alertMsg||"";
  const btn=document.getElementById("popup-btn");
  if(btn){
    btn.style.background = c;
    btn.style.color = "#fff";
    if(d.topicId){
      btn.onclick = function(){ closePopup(); goTopic(d.topicId); };
      btn.style.display = "";
    } else {
      btn.style.display = "none";
    }
  }
  document.getElementById("popup-overlay").classList.add("show");
}
function closePopup(){ document.getElementById("popup-overlay").classList.remove("show"); }

function showToast(msg, duration){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(function(){ el.classList.remove('show'); }, duration || 2500);
}

// ===== ナビ切り替え =====
function switchNav(nav){
  const prevNav = state.nav;
  state.nav=nav;
  if(nav==="explore" && state.exploreDepth===0){ state.selectedCat=null; }
  document.querySelectorAll(".nav-btn").forEach(b=>{ b.classList.toggle("active", b.dataset.nav===nav); });
  render();
  // 別画面への遷移時のみCM判定
  if(prevNav !== nav) maybeShowAd();
}

// ===== ナビスタック =====
function pushNav(){
  state.navStack.push({
    nav: state.nav, exploreDepth: state.exploreDepth,
    selectedCat: state.selectedCat, selectedSub: state.selectedSub,
    searchPhase: state.searchPhase, currentTopicId: state.currentTopicId,
    searchTab: state.searchTab, homeTab: state.homeTab,
    searchQuery: state.searchQuery, searched: state.searched
  });
}
function popNav(){
  var prev = state.navStack.pop();
  if(!prev){ switchNav('home'); return; }
  Object.assign(state, prev);
  document.querySelectorAll('.nav-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.nav === state.nav);
  });
  render();
}

// ===== レンダリング =====
function render(){
  const c=document.getElementById("content");
  c.scrollTop=0;
  c.classList.remove('page-enter');
  void c.offsetHeight; // reflow for re-trigger
  if(state.nav==="home")         c.innerHTML=renderHome();
  if(state.nav==="search")       c.innerHTML=renderSearch();
  if(state.nav==="explore")      c.innerHTML=renderExplore();
  if(state.nav==="alerts")       c.innerHTML=renderAlerts();
  if(state.nav==="settings")     c.innerHTML=renderSettings();
  if(state.nav==="sourceDetail") c.innerHTML=renderSourceDetail();
  if(state.nav==="amazon")       c.innerHTML=renderAmazon();
  c.classList.add('page-enter');
  document.getElementById("sens-badge").textContent=`感度 Lv.${state.sensitivity}`;
  bindEvents();
}

  return map[catName] || null;

// ===== 検索 =====
function toggleFilter(type, value){
  if(type==='cat'){
    const idx=state.filters.cats.indexOf(value);
    if(idx>=0) state.filters.cats.splice(idx,1);
    else state.filters.cats.push(value);
  } else if(type==='types'){
    if(!state.filters.types) state.filters.types=[];
    const idx=state.filters.types.indexOf(value);
    if(idx>=0) state.filters.types.splice(idx,1);
    else state.filters.types.push(value);
  } else {
    state.filters[type] = state.filters[type]===value ? '' : value;
  }
  render();
}

function clearFilters(){
  state.filters = { cats:[], types:[], trust:"", period:"", alert:"" };
  render();
}

function getFilteredSources(){
  const q = state.searchQuery.toLowerCase();
  const f = state.filters;
  return ALL_SOURCES.filter(s=>{
    // キーワード検索（タイトル・発行元・カテゴリ・要約）
    if(q && !s.title.toLowerCase().includes(q) &&
       !s.org.toLowerCase().includes(q) &&
       !s.cat.toLowerCase().includes(q) &&
       !(s.summary||'').toLowerCase().includes(q)) return false;
    // カテゴリフィルター
    if(f.cats.length>0 && !f.cats.includes(s.cat)) return false;
    // ソース種別
    if(f.types && f.types.length>0 && !f.types.includes(s.type)) return false;
    // 信頼度
    if(f.trust==='high' && s.score<90) return false;
    if(f.trust==='mid' && (s.score<50||s.score>=90)) return false;
    if(f.trust==='low' && s.score>=50) return false;
    // 期間
    if(f.period && s.period!==f.period) return false;
    // 注意喚起
    if(f.alert==='yes' && !s.alert) return false;
    if(f.alert==='no' && s.alert) return false;
    return true;
  }).sort((a,b)=>b.score-a.score);
}

function hasActiveFilter(){
  const f=state.filters;
  return f.cats.length>0||(f.types&&f.types.length>0)||f.trust||f.period||f.alert;

function renderFilterTags(){
  const p=P(), f=state.filters;
  const TAG_GROUPS = [
    { type:'cat',    label:'分野',     values: CATEGORIES.map(c=>c.label) },

    { type:'period', label:'期間',     values:[{v:'today',l:'今日'},{v:'week',l:'今週'},{v:'month',l:'今月'},{v:'year',l:'今年'}] },
    { type:'alert',  label:'注意喚起', values:[{v:'yes',l:'⚠あり'},{v:'no',l:'なし'}] },
  ];
  const activeCount = (f.cats.length) + (f.types?f.types.length:0) + (f.trust?1:0) + (f.period?1:0) + (f.alert?1:0);
  return `<div style="padding:8px 14px 4px;border-bottom:1px solid #0f1a2e">

    </div>
    ${TAG_GROUPS.map(g=>{
      const tags = g.values.map(v=>{
        const val = typeof v==='object'?v.v:v;
        const lbl = typeof v==='object'?v.l:v;
        let active;
        if(g.type==='cat') active=f.cats.includes(val);
        else if(g.type==='types') active=f.types&&f.types.includes(val);
        else active=f[g.type]===val;
        const bc = active?p.brand:'#1a2a4a';
        const tc = active?p.brand:'#aaa';
        const bg = active?p.brand+'22':'#0c1525';
        return `<button onclick="toggleFilter('${g.type}','${val}')" style="flex-shrink:0;padding:5px 12px;background:${bg};border:1px solid ${bc};border-radius:99px;font-size:11px;color:${tc};cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif">${active?'✓ ':''}${lbl}</button>`;

        <span style="font-size:10px;color:var(--text-3);flex-shrink:0;min-width:40px;padding-right:4px">${g.label}</span>
        <div style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex:1">${tags}</div>
      </div>`;
    }).join('')}
  </div>`;
}

// ===== キーワードスコアリング（タイトル一致10pt > タグ5pt > 要約3pt > カテゴリ2pt）
function scoreSearch(t, q){
  var ql = q.toLowerCase();
  var score = 0;
  if(t.title.toLowerCase().indexOf(ql) >= 0) score += 10;
  (t.tags||[]).forEach(function(tag){
    if(tag.toLowerCase().indexOf(ql) >= 0 || ql.indexOf(tag.toLowerCase()) >= 0) score += 5;
  });
  if((t.summary||'').toLowerCase().indexOf(ql) >= 0) score += 3;
  if((t.cat||'').toLowerCase().indexOf(ql) >= 0) score += 2;
  return score;
}

  var results = scored.map(function(x){ return x.t; });

  if(results.length === 0) return renderSearchNotFound(p, q);

  var cards = results.map(function(t){
    var rankColor = t.score>=90 ? p.high : t.score>=75 ? p.brand : p.mid;

    return '<div style="background:#0c1525;border:1px solid #1a2a4a;border-radius:14px;padding:16px;margin-bottom:12px;cursor:pointer"' +
      ' data-tid="' + t.id + '" data-ttl="' + t.title.replace(/"/g,'&quot;') + '"' +
      ' onclick="goTopicDetail(this)">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +

      '<div style="display:flex;align-items:center;justify-content:space-between">' +

function renderSearchTab(tab, score){
  if(tab===0) return renderSummaryTab();
  if(tab===1) return renderTimelineTab();
  if(tab===2) return renderSourcesTab();
  if(tab===3) return renderPerspectivesTab();
  if(tab===4) return renderRelatedTab();

}

function renderTimelineTab(){
  var p = P();
  var currentTopic = FACT_TOPICS.find(function(t){ return t.id === (state.currentTopicId||'hakamada_muzai'); }) || FACT_TOPICS[0];
  var currentData = TOPIC_DATA[currentTopic.id] || TOPIC_DATA['hakamada_muzai'];
  var items = (currentData && currentData.timeline) || [];
  if(state.timelineOrder === undefined) state.timelineOrder = 'asc';
  var ordered = state.timelineOrder === 'desc' ? items.slice().reverse() : items;
  var alertItems = items.filter(function(x){ return x.alert; }).length;
  var span = items.length > 0 ? (items[items.length-1].date.slice(0,4) - items[0].date.slice(0,4)) : 0;

  var header = '<div style="background:#0c1525;border:1px solid #1a2a4a;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">' +
    '<div style="font-size:12px;color:var(--text-2)">' + items.length + '件' + (span>0 ? '・' + span + '年間（' + items[0].date.slice(0,4) + '〜' + items[items.length-1].date.slice(0,4) + '年）' : '') + '</div>' +
    '<div style="display:flex;gap:6px">' +
    '<button onclick="state.timelineOrder=\"asc\";render()" style="padding:4px 10px;border-radius:99px;border:1px solid ' + (state.timelineOrder==='asc'?p.brand:'#1a2a4a') + ';background:' + (state.timelineOrder==='asc'?p.brand+'22':'transparent') + ';color:' + (state.timelineOrder==='asc'?p.brand:'#8899b0') + ';font-size:11px;cursor:pointer;font-family:sans-serif">古い順</button>' +
    '<button onclick="state.timelineOrder=\"desc\";render()" style="padding:4px 10px;border-radius:99px;border:1px solid ' + (state.timelineOrder==='desc'?p.brand:'#1a2a4a') + ';background:' + (state.timelineOrder==='desc'?p.brand+'22':'transparent') + ';color:' + (state.timelineOrder==='desc'?p.brand:'#8899b0') + ';font-size:11px;cursor:pointer;font-family:sans-serif">新しい順</button>' +
    '</div></div>';

  var legend = '<div style="display:flex;gap:12px;margin-bottom:14px">' +
    '<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:50%;background:' + p.brand + '"></div><span style="font-size:11px;color:var(--text-2)">通常</span></div>' +
    (alertItems>0 ? '<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:50%;background:' + p.warn + '"></div><span style="font-size:11px;color:var(--text-2)">注意喚起あり</span></div>' : '') +
    '</div>';

  var rows = ordered.map(function(item, i){
    var isLatest = state.timelineOrder==='desc' ? i===0 : i===ordered.length-1;
    var dotColor = item.alert ? p.warn : p.brand;
    var alertBox = item.alert && state.sensitivity>=2 ?
      '<div style="background:' + p.warn + '11;border:1px solid ' + p.warn + '33;border-radius:8px;padding:8px 10px;margin-top:8px;display:flex;align-items:flex-start;gap:8px">' +
      '<span style="font-size:12px;flex-shrink:0">📰</span>' +
      '<div style="font-size:11px;color:' + p.warn + ';line-height:1.6">' + item.msg + '</div></div>' : '';

    return '<div style="display:flex;gap:12px;margin-bottom:16px">' +
      '<div style="display:flex;flex-direction:column;align-items:center;padding-top:4px;flex-shrink:0">' +
      '<div style="width:10px;height:10px;border-radius:50%;background:' + dotColor + ';flex-shrink:0;position:relative">' +
      (isLatest ? '<div style="position:absolute;top:-3px;left:-3px;width:16px;height:16px;border-radius:50%;background:' + dotColor + '33;"></div>' : '') +
      '</div>' +
      (i<ordered.length-1 ? '<div style="width:1px;flex:1;background:#1a2a4a;margin-top:4px;min-height:20px"></div>' : '') +
      '</div>' +
      '<div style="flex:1;padding-bottom:8px">' +
      '<div style="font-size:13px;font-weight:700;color:' + dotColor + ';margin-bottom:4px">' + item.date + (isLatest?' <span style="font-size:10px;background:'+dotColor+'22;border:1px solid '+dotColor+'44;padding:1px 6px;border-radius:99px;margin-left:4px">最新</span>':'') + '</div>' +
      '<div style="font-size:13px;color:#ccc;line-height:1.7">' + item.event + '</div>' +
      alertBox +
      '</div></div>';
  }).join('');

  return header + legend + rows;
}


function renderSourcesTab(){
  var p = P();
  var q = state.searchQuery;
  if(state.sourceSort === undefined) state.sourceSort = 'score';
  if(state.showOtherMedia === undefined) state.showOtherMedia = false;
  if(state.expandedMediaId === undefined) state.expandedMediaId = null;

  // 現在のトピックを特定
  var currentTopic = FACT_TOPICS.find(function(t){ return t.id === (state.currentTopicId||'hakamada_muzai'); }) || FACT_TOPICS[0];
  var currentData = TOPIC_DATA[currentTopic.id] || {};

  // ソースデータ：null = ALL_SOURCES（袴田事件）を使用
  var sourceList = (currentData.sources !== null && currentData.sources) ? currentData.sources : ALL_SOURCES;

  var btnStyle = function(active){
    return 'padding:4px 12px;border-radius:99px;border:1px solid ' +
      (active?p.brand:'#1a2a4a') + ';background:' + (active?p.brand+'22':'transparent') +
      ';color:' + (active?p.brand:'#8899b0') +
      ';font-size:11px;cursor:pointer;font-family:"Noto Sans JP",sans-serif';
  };

  var jaSources = sourceList.filter(function(s){ return s.lang==='ja'; });
  var enSources = sourceList.filter(function(s){ return s.lang==='en'; });

  if(state.sourceSort === 'score'){
    jaSources.sort(function(a,b){ return b.score-a.score; });
    enSources.sort(function(a,b){ return b.score-a.score; });
  }

  var makeMediaCard = function(s){
    var rankColor = s.score>=90 ? p.high : s.score>=75 ? p.brand : p.mid;
    var isExpanded = state.expandedMediaId == s.id; // 文字列・数値の型差を吸収
    var articleCount = s.articles ? s.articles.length : 0;

    var articleList = '';
    if(isExpanded && s.articles){
      articleList = '<div style="margin-top:12px;border-top:1px solid #1a2a4a;padding-top:12px">' +
        s.articles.map(function(a){
          var safeUrl = getArticleUrl(a, s.org);
          return '<div style="padding:10px 0;border-bottom:1px solid #0f1a2e">' +
            '<div style="font-size:13px;font-weight:600;color:#ddd;line-height:1.5;margin-bottom:4px">' + (a.title||'') + '</div>' +
            '<div style="font-size:11px;color:var(--text-2);margin-bottom:4px">📅 ' + (a.date||'') + '</div>' +
            '<div style="font-size:11px;color:#666;line-height:1.6;margin-bottom:8px">' + (a.summary||'') + '</div>' +
            (safeUrl ? '<a href="' + safeUrl + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="font-size:11px;font-weight:600;color:' + p.brand + ';background:' + p.brand + '15;border:1px solid ' + p.brand + '44;padding:4px 14px;border-radius:99px;cursor:pointer;text-decoration:none;display:inline-block">記事を読む ↗</a>' : '') +
            '</div>';
        }).join('') + '</div>';
    }

    return '<div style="background:#0c1525;border:1px solid ' + (isExpanded?p.brand+'66':'#1a2a4a') + ';border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer" onclick="state.expandedMediaId=(state.expandedMediaId===\'' + s.id + '\'?null:\'' + s.id + '\');render()">' +
      '<div style="display:flex;align-items:center;justify-content:space-between">' +
      '<div>' +
      '<span style="font-size:15px;font-weight:700;color:#e0e6f0">' + s.org + '</span>' +
      '<div style="display:flex;align-items:center;gap:6px;margin-top:4px">' +
      '<span class="type-tag ' + typeClass(s.type) + '" style="font-size:10px">' + s.type + '</span>' +
      '<span style="font-size:11px;color:var(--text-2)">' + articleCount + '件の記事</span>' +
      '</div></div>' +
      '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">' +
      '<span style="font-family:monospace;font-size:18px;font-weight:900;color:' + rankColor + '">' + s.score + '</span>' +
      '<span style="font-size:10px;color:' + rankColor + '">pt</span>' +
      '<span style="font-size:14px;color:var(--text-2)">' + (isExpanded?'▼':'›') + '</span>' +
      '</div></div>' +
      articleList + '</div>';
  };

  // 他のメディアセクション
  var otherHtml = '';
  if(state.showOtherMedia){
    var showEn = state.showEnMedia !== false;
    var groups = [
      { rank:'S', label:'S — 政府・公共放送・国際通信社', color:p.high },
      { rank:'A', label:'A — 主要全国紙・テレビ局・海外主要紙', color:p.brand },
      { rank:'B', label:'B — 専門・地方・海外誌', color:p.mid },
    ];
    otherHtml = '<div style="padding:12px 0">' +
      groups.map(function(g){
        var medias = MEDIA_MASTER.filter(function(m){ return m.rank===g.rank && (showEn||m.lang==='ja'); });
        if(!medias.length) return '';
        return '<div style="margin-bottom:16px">' +
          '<div style="font-size:11px;font-weight:700;color:' + g.color + ';margin-bottom:8px">' + g.label + '</div>' +
          '<div style="display:flex;flex-wrap:wrap;gap:6px">' +
          medias.map(function(m){
            var url = makeGNewsUrl(m.domain, q);
            return '<div onclick="openUrl(\'' + url + '\')" style="cursor:pointer;padding:6px 12px;background:#0c1525;border:1px solid #1a2a4a;border-radius:99px;display:flex;align-items:center;gap:3px">' +
              '<span style="font-size:12px;color:#e0e6f0">' + m.name + '</span>' +
              (m.lang==='en'?'<span style="font-size:10px;color:var(--text-2);margin-left:2px">EN</span>':'') +
              '<span style="font-size:10px;color:#2a5a9a">↗</span></div>';
          }).join('') + '</div></div>';
      }).join('') + '</div>';
  }

  var totalArticles = sourceList.reduce(function(sum,s){ return sum+(s.articles?s.articles.length:0); }, 0);

  return '<div>' +
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">' +
    '<div><div style="font-size:15px;font-weight:700;color:#e0e6f0">確認済みソース</div>' +
    '<div style="font-size:11px;color:var(--text-2);margin-top:3px">' + sourceList.length + 'メディア · ' + totalArticles + '件の記事を収集</div>' +
    '</div>' +
    '<div style="display:flex;gap:4px">' +
    '<button onclick="state.sourceSort=\'score\';render()" style="' + btnStyle(state.sourceSort==='score') + '">信頼度順</button>' +
    '<button onclick="state.sourceSort=\'date\';render()" style="' + btnStyle(state.sourceSort==='date') + '">新しい順</button>' +
    '</div></div>' +
    (jaSources.length ? '<div style="font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:10px">🇯🇵 国内メディア（' + jaSources.length + '）</div>' + jaSources.map(makeMediaCard).join('') : '') +
    (enSources.length ? '<div style="border-top:1px solid #1a2a4a;margin:14px 0"></div><div style="font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:10px">🌐 海外メディア（' + enSources.length + '）</div>' + enSources.map(makeMediaCard).join('') : '') +
    '<div style="border-top:1px solid #1a2a4a;margin:16px 0"></div>' +
    '<div onclick="state.showOtherMedia=!state.showOtherMedia;render()" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 0">' +
    '<div><div style="font-size:13px;font-weight:600;color:#aaa">他のメディアでも探す</div>' +
    '<div style="font-size:11px;color:var(--text-2);margin-top:2px">Google News 経由で' + MEDIA_MASTER.length + 'メディアを検索</div>' +
    '</div><span style="font-size:14px;color:var(--text-2)">' + (state.showOtherMedia?'▲':'▼') + '</span>' +
    '</div>' + otherHtml + '</div>';
}

var _exploreTimer = null;

function onExploreInput(val){
  state.exploreQuery = val;
  // クリアボタン表示切り替え（DOMは再生成しない）
  var btn = document.getElementById('explore-clear-btn');
  if(btn) btn.style.display = val ? 'block' : 'none';
  // 300msデバウンス後に結果エリアだけ更新
  clearTimeout(_exploreTimer);
  _exploreTimer = setTimeout(function(){
    var el = document.getElementById('explore-results');
    if(el) el.innerHTML = buildExploreResults();
  }, 300);
}

function clearExploreSearch(){
  state.exploreQuery = '';
  var inp = document.getElementById('explore-search-input');
  if(inp){ inp.value = ''; inp.focus(); }
  var btn = document.getElementById('explore-clear-btn');
  if(btn) btn.style.display = 'none';
  clearTimeout(_exploreTimer);
  var el = document.getElementById('explore-results');
  if(el) el.innerHTML = buildExploreResults();
}

function onExploreSubmit(){
  var q = (state.exploreQuery||'').trim();
  if(!q) return;
  state.searchQuery = q;
  state.exploreQuery = '';
  doSearch();
}

function buildExploreResults(){
  var eq = (state.exploreQuery||'').trim();
  var p = P();

  if(!eq){
    // カテゴリリスト（横並び1列）
    var cards = CATEGORIES.map(function(c){
      var isEmpty = c.count === 0;
      var op = isEmpty ? 'opacity:0.4;' : '';
      return '<div class="cat-card' + (c.alert&&!isEmpty?' has-alert':'') + '"' +
        (isEmpty ? ' style="cursor:default"' : ' onclick="selectCat(\'' + c.id + '\')"') + '>' +
        '<div class="cat-icon" style="' + op + '">' + c.icon + '</div>' +
        '<div class="cat-name" style="' + op + '">' + c.label + '</div>' +
        (c.alert&&!isEmpty ? '<span class="alert-dot">⚠️</span>' : '') +
        '<div class="cat-count" style="' + op + '">' + (isEmpty ? '準備中' : c.count + '件') + '</div>' +
        (!isEmpty ? '<span style="color:var(--brand);font-size:16px;margin-left:2px;font-weight:300">›</span>' : '') +
        '</div>';
    }).join('');
    return '<div class="cat-grid">' + cards + '</div>';
  }

  // 検索結果
  var scored = FACT_TOPICS.map(function(t){ return { t:t, s:scoreSearch(t,eq) }; })
                           .filter(function(x){ return x.s > 0; });
  scored.sort(function(a,b){ return b.s - a.s; });
  var matched = scored.map(function(x){ return x.t; });

  if(matched.length === 0){
    return '<div style="padding:32px 14px;text-align:center">' +
      '<div style="font-size:28px;margin-bottom:10px">📭</div>' +
      '<div style="font-size:13px;font-weight:600;color:#e0e6f0;margin-bottom:6px">「' + eq + '」は記録にありません</div>' +
      '<div style="font-size:11px;color:var(--text-2);margin-bottom:14px">外部ニュースや全DBで検索できます</div>' +
      '<button onclick="onExploreSubmit()" style="padding:8px 20px;background:var(--brand-dim);border:1px solid rgba(74,158,255,0.3);border-radius:99px;font-size:12px;color:var(--brand);cursor:pointer;font-family:\'Noto Sans JP\',sans-serif;font-weight:600">全DBで検索 →</button>' +
      '</div>';
  }

  var matchCards = matched.map(function(t){
    var rankColor = t.score>=90 ? p.high : t.score>=75 ? p.brand : p.mid;
    return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color var(--t-fast),background var(--t-fast)"' +
      ' onclick="goTopic(\''+t.id+'\')"' +
      ' ontouchstart="this.style.background=\'var(--surface-2)\'" ontouchend="this.style.background=\'var(--surface)\'">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">' +
      '<span style="font-size:10px;color:var(--text-2);background:#1a2a4a;padding:2px 8px;border-radius:99px">' + t.cat + '</span>' +
      '<span style="font-family:monospace;font-size:14px;font-weight:900;color:' + rankColor + '">' + t.score + 'pt</span>' +
      '</div>' +
      '<div style="font-size:13px;font-weight:700;color:#e0e6f0;line-height:1.4;margin-bottom:4px">' + t.title + '</div>' +
      '<div style="font-size:11px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + t.summary + '</div>' +
      '</div>';
  }).join('');

  return '<div style="padding:8px 14px 0">' +
    '<div style="font-size:11px;color:var(--text-2);margin-bottom:8px">' + matched.length + '件がヒット · <span style="color:var(--brand);cursor:pointer" onclick="onExploreSubmit()">全DBで検索 →</span></div>' +
    matchCards + '</div>';

      var rankColor = t.score>=90 ? p.high : t.score>=75 ? p.brand : p.mid;
      var _td2 = TOPIC_DATA[t.id];
      var srcCount = _td2 ? (_td2.sources === null ? ALL_SOURCES.length : (_td2.sources ? _td2.sources.length : t.sourceCount)) : t.sourceCount;
      var alertBadge = t.alert ?
        '<span style="font-size:10px;color:' + p.warn + ';background:' + p.warn + '11;border:1px solid ' + p.warn + '33;padding:1px 6px;border-radius:99px;margin-left:6px">⚠️</span>' : '';
      var tags = (t.tags||[]).map(function(tag){
        return '<span style="font-size:10px;color:var(--text-2);background:#1a2a4a;padding:2px 8px;border-radius:99px">' + tag + '</span>';
      }).join('');

      return '<div style="background:#0c1525;border:1px solid #1a2a4a;border-radius:14px;padding:16px;margin-bottom:12px;cursor:pointer;transition:border-color 0.15s,transform 0.1s,background 0.1s"' +
        ' data-tid="' + t.id + '" data-ttl="' + t.title.replace(/"/g,'&quot;') + '"' +
        ' onmousedown="this.style.transform=\'scale(0.985)\'" onmouseup="this.style.transform=\'\'" onmouseleave="this.style.transform=\'\'"' +
        ' ontouchstart="this.style.transform=\'scale(0.985)\';this.style.background=\'#0f1e35\'" ontouchend="this.style.transform=\'\';this.style.background=\'#0c1525\'"' +
        ' onclick="goTopicDetail(this)">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +
        '<div style="display:flex;align-items:center;gap:6px">' +
        '<span style="font-size:11px;color:var(--text-2);background:#1a2a4a;padding:2px 8px;border-radius:99px">' + t.cat + '</span>' +
        alertBadge + '</div>' +
        '<div style="display:flex;align-items:baseline;gap:2px">' +
        '<span style="font-family:monospace;font-size:18px;font-weight:900;color:' + rankColor + '">' + t.score + '</span>' +
        '<span style="font-size:11px;color:' + rankColor + '">pt</span>' +
        '</div></div>' +
        '<div style="font-size:16px;font-weight:700;color:#e0e6f0;line-height:1.5;margin-bottom:8px">' + t.title + '</div>' +
        '<div style="font-size:12px;color:#777;line-height:1.7;margin-bottom:10px">' + t.summary + '</div>' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">' +
        '<span style="font-size:11px;color:var(--text-2)">📰 ' + srcCount + '件のソースを分析 · ' + t.date + '</span>' +
        '<span style="font-size:12px;color:' + p.brand + ';font-weight:600">詳細を見る →</span>' +
        '</div>' +
        '<div style="display:flex;gap:4px;flex-wrap:wrap">' + tags + '</div>' +
        '</div>';
    }).join('');

    return breadcrumb + '<div style="padding:4px 0">' + topicCards + '</div>';
  }

  return '';
}

// ===== イベント =====
function bindEvents(){
  const hs=document.getElementById("home-search");
  if(hs){ hs.addEventListener("input",e=>state.searchQuery=e.target.value); hs.addEventListener("keydown",e=>e.key==="Enter"&&doSearch()); }
  // main-search は廃止（ホーム検索窓に統一）
}

function doSearch(){
  const hs=document.getElementById("home-search");
  const ss=document.getElementById("search-input");
  if(hs) state.searchQuery=hs.value;
  if(ss) state.searchQuery=ss.value;
  if(!state.searchQuery.trim()) return;
  // 履歴に追加（重複除去・最大10件）・localStorage保存
  state.history = [state.searchQuery, ...state.history.filter(h=>h!==state.searchQuery)].slice(0,10);
  persistState();
  state.searched=true;
  state.searchTab=0;
  state.searchPhase='results';
  state.currentTopicId=null;
  state.currentTopicId=null;
  switchNav("search");
}

function setTab(i){ state.searchTab=i; render(); }
function setSearchQuery(q){
  state.searchQuery=q;
  state.history=[q,...state.history.filter(h=>h!==q)].slice(0,10);
  state.searched=true;
  state.searchTab=0;
  // タイトルからIDを逆引き
  var matched = FACT_TOPICS.find(function(t){ return t.title===q; });
  state.currentTopicId = matched ? matched.id : null;
  state.searchPhase = matched ? 'detail' : 'results';
  switchNav('search');
}

function goTopic(topicId){
  var t = FACT_TOPICS.find(function(x){ return x.id===topicId; });
  if(!t) return;
  pushNav();
  state.currentTopicId = topicId;
  state.searchQuery = t.title;
  state.history=[t.title,...state.history.filter(h=>h!==t.title)].slice(0,10);
  state.searched = true;
  state.searchTab = 0;
  state.searchPhase = 'detail';
  switchNav('search');
  render();
}
function setExploreDepth(d){ state.exploreDepth=d; if(d===0){state.selectedCat=null;state.selectedSub=null;} render(); }
function selectCat(id){ state.selectedCat=CATEGORIES.find(c=>c.id===id); state.exploreDepth=1; state.selectedSub=null; render(); }
function selectSub(i,label){ state.selectedSub={label}; state.exploreDepth=2; render(); }
function updateSensitivity(v){
  state.sensitivity=Number(v);
  const levels=["最小","低め","標準","高め","最大"];
  const descs=["科学的に完全否定された情報のみ表示します","明確な誤情報と政府公式と大きく矛盾する情報を表示します","標準：主要メディア間の論調の乖離も含めて表示します","専門家見解との軽微な差異も表示します","すべての不確実性・未確認情報に反応します"];
  const sl=document.getElementById("sens-label");
  const sd=document.getElementById("sens-desc");
  if(sl) sl.textContent=`Lv.${v} — ${levels[v-1]}`;
  if(sd) sd.textContent=descs[v-1];
  document.getElementById("sens-badge").textContent=`感度 Lv.${v}`;
  persistState();
}

function focusSearch(){
  state.searchFocused = true;

  </div>

  <div style="padding:0 14px 14px">
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input id="amz-input-full" class="search-input"
        placeholder="商品・キーワードを入力..."
        style="flex:1;font-size:14px"
        onkeydown="if(event.key==='Enter')doAmazonSearch('full')">
      <button onclick="doAmazonSearch('full')"
        style="padding:10px 18px;background:#FF9900;border:none;border-radius:8px;color:#111;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif">検索</button>
    </div>

    <div style="font-size:10px;color:#4a9eff;letter-spacing:1.5px;font-family:monospace;margin-bottom:8px">CATEGORIES</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
      ${categories.map(c=>`
      <button onclick="setAmazonQuery('${c.q}','full')"
        style="background:#0c1525;border:1px solid #1a2a4a;border-radius:10px;padding:12px 8px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column;align-items:center;gap:4px;transition:border-color 0.2s"
        onmouseover="this.style.borderColor='#2a4a7a'" onmouseout="this.style.borderColor='#1a2a4a'">
        <span style="font-size:22px">${c.icon}</span>
        <span style="font-size:11px;color:#ccc">${c.label}</span>
      </button>`).join('')}
    </div>

    <div style="font-size:10px;color:#4a9eff;letter-spacing:1.5px;font-family:monospace;margin-bottom:8px">NEWS連動キーワード</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">
      ${newsKeywords.map(k=>`
      <button onclick="setAmazonQuery('${k}','full')"
        style="padding:6px 14px;background:#FF990011;border:1px solid #FF990033;border-radius:99px;font-size:12px;color:#FF9900;cursor:pointer;font-family:'Noto Sans JP',sans-serif">${k}</button>`).join('')}
    </div>

    <div style="background:#0c1525;border:1px solid #1a2a4a;border-radius:10px;padding:12px">
      <div style="font-size:11px;color:#FF9900;margin-bottom:6px">📋 Amazonアソシエイトについて</div>
      <div style="font-size:11px;color:var(--text-2);line-height:1.7">FACTはAmazonアソシエイト・プログラムに参加しています。このリンクから購入された場合、売上の一部がFACTの運営費用に充てられます。商品価格に変わりはありません。</div>
    </div>
  </div>
  <div style="height:20px"></div>`;
}

function updateSearchSuggestions(){
  // サジェスト機能（将来実装予定）。現時点ではクリアボタン表示制御のみ
  var btn = document.getElementById('search-clear-btn');
  if(btn) btn.style.display = state.searchQuery ? 'block' : 'none';
}

function navSearch(){
  if(state.nav !== "search"){
    // 他画面から来た場合：検索画面を表示（フォーカスはしない）
    state.searched = false;
    state.searchFocused = false;
    switchNav("search");
  } else if(state.searched){
    // 結果画面から：未検索状態に戻す（フォーカスはしない）
    state.searched = false;
    state.searchFocused = false;
    render();
  }
  // 検索画面にいる場合は何もしない
}

function openSourceDetail(sourceId){
  // ALL_SOURCESから取得（SOURCESはスライスなので全件対応）
  var found = ALL_SOURCES.find(function(s){ return s.id === sourceId; });
  state.sourceDetail = found || ALL_SOURCES[sourceId] || null;
  if(!state.sourceDetail) return;
  pushNav();
  state.nav = 'sourceDetail';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  render();
}

function closeSourceDetail(){
  state.sourceDetail = null;
  popNav();
}

function renderSourceDetail(){
  const s = state.sourceDetail;
  if(!s) return '';
  const p = P();
  const c = scoreColor(s.score);

  // ALL_SOURCES にはarticlesが入っているので最初の記事から情報を取得
  const firstArticle = (s.articles && s.articles[0]) || {};
  const title = firstArticle.title || s.org;
  const date = firstArticle.date || '';
  const summary = firstArticle.summary || '';
  const url = firstArticle.url || '';

  // MEDIA_MASTER からランク取得
  const mediaMeta = MEDIA_MASTER.find(function(m){ return m.name === s.org; });
  const rank = mediaMeta ? mediaMeta.rank : (s.score >= 90 ? 'S' : s.score >= 80 ? 'A' : 'B');
  const rankColors = { S: p.high, A: p.mid, B: p.warn };
  const rankColor = rankColors[rank] || p.warn;
  const scoreDetail = {
    rank: rank + ' — ' + (mediaMeta ? mediaMeta.cat : s.type),
    match: s.score >= 90 ? '高（複数ソースと一致）' : s.score >= 70 ? '中（一部一致）' : '低（要確認）',
    freshness: date ? '最新情報あり' : '不明',
    primary: s.score >= 90 ? '一次ソース確認済み' : '二次ソース含む',
  };

  return `
  <div style="background:#0c1525;border-bottom:1px solid #1a2a4a;padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;">
    <button onclick="closeSourceDetail()" style="background:none;border:none;color:#4a9eff;font-size:20px;cursor:pointer;padding:0;line-height:1">‹</button>
    <span style="font-size:13px;font-weight:700;color:#e0e6f0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.org}</span>
    <span style="font-family:monospace;font-size:14px;color:${c};font-weight:900">${s.score}pt</span>
  </div>

  <div style="padding:16px 14px 0">

    <div style="margin-bottom:16px">
      <span class="type-tag ${typeClass(s.type)}" style="margin-bottom:8px;display:inline-block">${s.type}</span>
      <div style="font-size:15px;font-weight:700;color:#e0e6f0;line-height:1.5;margin-bottom:6px">${title}</div>
      <div style="font-size:11px;color:var(--text-2);font-family:monospace">${date}</div>
    </div>

    <div style="margin-bottom:4px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <div style="flex:1;height:8px;background:#1a2035;border-radius:99px;overflow:hidden">
          <div style="width:${s.score}%;height:100%;background:linear-gradient(90deg,${c}88,${c});border-radius:99px"></div>
        </div>
        <span style="font-family:monospace;font-size:16px;color:${c};font-weight:900;min-width:32px">${s.score}</span>
      </div>
      <div style="font-size:11px;color:${c};font-weight:600;margin-bottom:16px">● ${scoreLabel(s.score)}</div>
    </div>

    ${summary ? `
    <div class="card" style="margin-bottom:12px">
      <div class="section-title">AIによる要約</div>
      <p style="font-size:13px;line-height:1.8;color:#ccc">${summary}</p>
    </div>` : ''}

    <div class="card" style="margin-bottom:16px">
      <div class="section-title">信頼度スコアの根拠</div>
      ${[
        ['🏛️', '発行元ランク', scoreDetail.rank, rankColor, 'メディアの公信力・規模・実績'],
        ['🔗', '他ソースとの一致度', scoreDetail.match, p.mid, '複数の独立した報道機関との照合'],
        ['🕐', '情報の新しさ', scoreDetail.freshness, p.brand, '一次情報の取得・更新日時'],
        ['📍', '一次ソースへの遡及', scoreDetail.primary, p.mid, '政府・公式機関の発表との紐付け'],
      ].map(([ico, label, val, col, hint])=>`
        <div style="padding:10px 0;border-bottom:1px solid #0f1a2e">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
            <span style="font-size:12px;color:#aaa">${ico} ${label}</span>
            <span style="font-size:12px;color:${col};font-weight:700">${val}</span>
          </div>
          <div style="font-size:10px;color:#3a4a6a">${hint}</div>
        </div>`).join('')}
    </div>

    ${s.articles && s.articles.length > 1 ? `
    <div class="card" style="margin-bottom:16px">
      <div class="section-title">記事一覧（${s.articles.length}件）</div>
      ${s.articles.map(a=>`
        <div style="padding:10px 0;border-bottom:1px solid #0f1a2e">
          <div style="font-size:13px;font-weight:600;color:#ddd;margin-bottom:4px">${a.title||''}</div>
          <div style="font-size:11px;color:var(--text-2);margin-bottom:6px">📅 ${a.date||''}</div>
          ${a.url ? `<a href="${a.url}" target="_blank" rel="noopener" style="font-size:11px;color:${p.brand};background:${p.brand}15;border:1px solid ${p.brand}44;padding:3px 10px;border-radius:99px;cursor:pointer;text-decoration:none;display:inline-block">記事を読む ↗</a>` : ''}
        </div>`).join('')}
    </div>` : ''}

    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      ${url ? `<a href="${url}" target="_blank" rel="noopener" style="text-decoration:none;display:block">
        <div style="background:${p.brand};border-radius:10px;padding:14px;text-align:center">
          <div style="font-size:14px;font-weight:700;color:#fff">元記事を読む ↗</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.6);margin-top:2px">${s.org} で開く</div>
        </div>
      </a>` : ''}
      <div style="background:#1a2a4a22;border:1px solid #1a2a4a;border-radius:10px;padding:12px;text-align:center;cursor:pointer" onclick="switchNav('explore')">
        <div style="font-size:13px;font-weight:600;color:#4a9eff">🗄️ 記録を閲覧する</div>
        <div style="font-size:10px;color:var(--text-3);margin-top:2px">カテゴリから探す</div>
      </div>
    </div>

  </div>`;
}

function navExplore(){
  if(state.nav !== "explore"){
    // 他画面から探索へ：現在の深さを維持
    switchNav("explore");
    return;
  }
  // 探索画面内：1階層戻る
  if(state.exploreDepth === 2){
    state.exploreDepth = 1;
    state.selectedSub = null;
    render();
    flashNav("explore");
  } else if(state.exploreDepth === 1){
    state.exploreDepth = 0;
    state.selectedCat = null;
    state.selectedSub = null;
    render();
    flashNav("explore");
  } else {
    // すでにトップ：軽くフラッシュして「ここがトップ」を伝える
    flashNav("explore");
  }
}

function flashNav(navId){
  const btn = document.querySelector(`.nav-btn[data-nav="${navId}"]`);
  if(!btn) return;
  btn.style.background = "rgba(74,158,255,0.15)";
  setTimeout(()=>{ btn.style.background = ""; }, 200);
}

function updateColorMode(mode){
  state.colorMode=mode;
  applyColorMode();
  persistState();
  render();
}
function applyColorMode(){
  const p=P();
  document.documentElement.style.setProperty('--brand', p.brand);
  // モノクロ時はbodyにfilterをかけない（記号で区別するため）
  const label = {normal:'標準',protanopia:'P型/D型（赤緑）',tritanopia:'T型（青黄）',mono:'モノクローム'}[state.colorMode]||'標準';
  const badge=document.getElementById('color-mode-badge');
  if(badge) badge.textContent=state.colorMode==='normal'?'':' | '+label;
}

// ===== Service Worker 登録 =====
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

// 初期描画：topics.json をフェッチしてからレンダリング
applyColorMode();
fetch('./data/topics.json')
  .then(function(r){ return r.json(); })
  .then(function(d){
    FACT_TOPICS = d.FACT_TOPICS;
    TOPIC_DATA  = d.TOPIC_DATA;
    render();
  })
  .catch(function(e){
    console.error('topics.json の読み込みに失敗しました:', e);
    render();
  });
</script>
</body>
</html>
