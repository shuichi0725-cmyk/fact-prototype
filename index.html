* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --brand: #4a9eff; }
body { background: #080e1e; color: #e0e6f0; font-family: 'Noto Sans JP', sans-serif; display: flex; justify-content: center; }
::-webkit-scrollbar { display: none; }

#app { width: 100%; max-width: 400px; min-height: 100vh; display: flex; flex-direction: column; position: relative; background: #080e1e; }

/* ヘッダー */
#header { background: #0c1525; border-bottom: 1px solid #1a2a4a; padding: 12px 16px; display: flex; align-items: center; gap: 10; flex-shrink: 0; }
.logo { font-family: monospace; font-weight: 900; font-size: 18px; color: var(--brand); letter-spacing: 2px; }
.logo-sub { font-size: 10px; color: var(--brand); letter-spacing: 1px; opacity: 0.6; margin-left: 8px; }
.sensitivity-badge { margin-left: auto; font-size: 10px; color: #555; font-family: monospace; }

/* コンテンツ */
#content { flex: 1; overflow-y: auto; padding-bottom: 70px; }

/* 下部ナビ */
#bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; background: #0c1525; border-top: 1px solid #1a2a4a; display: flex; z-index: 50; }
.nav-btn { flex: 1; padding: 10px 4px 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; border: none; background: none; cursor: pointer; border-top: 2px solid transparent; transition: border-color 0.2s; }
.nav-btn.active { border-top-color: var(--brand); }
.nav-btn.active .nav-label { color: var(--brand); }
.nav-icon { font-size: 18px; }
.nav-btn:not(.active) .nav-icon { filter: grayscale(1) opacity(0.5); }
.nav-label { font-size: 9px; color: #555; letter-spacing: 0.5px; }

/* 共通 */
.section { padding: 14px 14px 0; }
.section-title { font-size: 10px; color: var(--brand); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; font-family: monospace; }
.card { background: #0c1525; border: 1px solid #1a2a4a; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.card.clickable { cursor: pointer; transition: border-color 0.2s; }
.card.clickable:hover { border-color: #2a4a7a; }

/* カテゴリグリッド */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 14px; }
.cat-card { background: #0c1525; border: 1px solid #1a2a4a; border-radius: 10px; padding: 14px 12px; cursor: pointer; position: relative; transition: border-color 0.2s; }
.cat-card:hover { border-color: #2a4a7a; }
.cat-card.has-alert { border-color: #FF980044; }
.cat-card .cat-icon { font-size: 24px; margin-bottom: 6px; }
.cat-card .cat-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
.cat-card .cat-count { font-size: 10px; color: #555; }
.cat-card .alert-dot { position: absolute; top: 8px; right: 8px; font-size: 10px; color: #FF9800; }

/* スコアバー */
.score-bar-wrap { display: flex; align-items: center; gap: 8px; }
.score-bar-track { flex: 1; height: 6px; background: #1a2035; border-radius: 99px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }
.score-val { font-family: monospace; font-size: 13px; font-weight: 700; min-width: 28px; }

/* タグ */
.type-tag { font-size: 10px; padding: 2px 8px; border-radius: 99px; border: 1px solid; display: inline-block; }
.tag-nhk { color: #4a9eff; background: #4a9eff22; border-color: #4a9eff44; }
.tag-paper { color: #8BC34A; background: #8BC34A22; border-color: #8BC34A44; }
.tag-gov { color: #FF9800; background: #FF980022; border-color: #FF980044; }
.tag-academic { color: #9C27B0; background: #9C27B022; border-color: #9C27B044; }

/* アラートバッジ */
.alert-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 4px; font-size: 11px; cursor: pointer; border: 1px solid; }

/* タブ */
.tabs { display: flex; border-bottom: 1px solid #1a2a4a; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab-btn { padding: 10px 14px; font-size: 11px; white-space: nowrap; border: none; background: none; color: #555; border-bottom: 2px solid transparent; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: color 0.2s; }
.tab-btn.active { color: #4a9eff; border-bottom-color: #4a9eff; font-weight: 700; }

/* 検索ボックス */
.search-box { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
.search-input { flex: 1; background: #0c1525; border: 1px solid #1a2a4a; border-radius: 8px; padding: 10px 14px; color: #e0e6f0; font-size: 14px; outline: none; font-family: 'Noto Sans JP', sans-serif; transition: border-color 0.2s; }
.search-input:focus { border-color: #4a9eff44; }

.search-btn { padding: 10px 16px; background: #4a9eff; border: none; border-radius: 8px; color: #fff; font-weight: 700; cursor: pointer; font-size: 13px; white-space: nowrap; font-family: 'Noto Sans JP', sans-serif; }

.breadcrumb .crumb-sep { color: #2a4a7a; font-size: 14px; font-weight: 300; }
.breadcrumb .back-hint { margin-left: auto; font-size: 10px; color: #2a5a9a; display: flex; align-items: center; gap: 3px; }

.timeline-item { display: flex; gap: 12px; margin-bottom: 16px; }
.timeline-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.timeline-line { width: 1px; flex: 1; background: #1a2a4a; margin-top: 4px; margin-left: 4px; }

#popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-end; padding-bottom: 80px; }

.hscroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 14px; scrollbar-width: none; }

/* range input */
input[type=range] { width: 100%; accent-color: #4a9eff; }

.source-card { background: #0c1525; border: 1px solid #1a2a4a; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }

.perspective-card { background: #0c1525; border: 1px solid #1a2a4a; border-radius: 10px; padding: 14px; margin-bottom: 10px; }

</style>

// カラーパレット定義
const PALETTES = {
  normal:     { high:"#4CAF50", mid:"#8BC34A", warn:"#FF9800", danger:"#F44336", brand:"#4a9eff", bias:"#FF9800", fact:"#F44336", sns:"#E91E63", old:"#607D8B", conflict:"#9C27B0" },
  protanopia: { high:"#0077BB", mid:"#33BBEE", warn:"#EE7733", danger:"#EE3377", brand:"#0077BB", bias:"#EE7733", fact:"#EE3377", sns:"#AA3377", old:"#BBBBBB", conflict:"#EE7733" },
  tritanopia: { high:"#009E73", mid:"#56B4E9", warn:"#E69F00", danger:"#D55E00", brand:"#56B4E9", bias:"#E69F00", fact:"#D55E00", sns:"#CC79A7", old:"#999999", conflict:"#E69F00" },
  mono:       { high:"#FFFFFF", mid:"#CCCCCC", warn:"#888888", danger:"#444444", brand:"#FFFFFF", bias:"#AAAAAA", fact:"#666666", sns:"#888888", old:"#AAAAAA", conflict:"#777777" },
};
function P(){ return PALETTES[state.colorMode||"normal"]; }
function scoreSymbol(s){ return state.colorMode==="mono"?(s>=90?"◆":s>=70?"▲":s>=50?"■":"✕"):""; }
function brandColor(){ return P().brand; }

// ===== ユーティリティ =====
function scoreColor(s){ const p=P(); return s>=90?p.high:s>=70?p.mid:s>=50?p.warn:p.danger; }
function scoreLabel(s){ return s>=90?"高信頼":s>=70?"信頼":s>=50?"要確認":"注意"; }
function alertColor(t){ const p=P(); return {bias:p.bias,fact:p.fact,sns:p.sns,old:p.old,conflict:p.conflict}[t]||p.warn; }
function alertIcon(t){  return {bias:"📰",fact:"⚠️",sns:"📣",old:"🕐",conflict:"⚖️"}[t]||"⚠️"; }
function typeClass(t){ return {公共放送:"tag-nhk",主要紙:"tag-paper",政府機関:"tag-gov",学術:"tag-academic"}[t]||""; }

function scoreBarHTML(score, sm=false){
  const c=scoreColor(score), h=sm?4:6;
  const sym=scoreSymbol(score);
  const pattern=state.colorMode==="mono"?"repeating-linear-gradient(45deg,"+c+","+c+" 2px,transparent 2px,transparent 6px)":"linear-gradient(90deg,"+c+"88,"+c+")";
  return `<div class="score-bar-wrap">
    <div class="score-bar-track" style="height:${h}px">
      <div class="score-bar-fill" style="width:${score}%;background:${pattern}"></div>
    </div>
    <span class="score-val" style="color:${c};font-size:${sm?11:13}px">${sym}${score}</span>
  </div>`;
}

function alertBadgeHTML(alert){
  if(!alert) return "";
  const c=alertColor(alert.type), icon=alertIcon(alert.type);
  const data=encodeURIComponent(JSON.stringify(alert));
  return `<span class="alert-badge" style="color:${c};background:${c}22;border-color:${c}55" onclick="showPopup(decodeURIComponent('${data}'))">${icon} 注意</span>`;
}

// ===== ポップアップ =====
function showPopup(dataStr){
  let d;
  try{ d = typeof dataStr==="string" ? JSON.parse(dataStr) : dataStr; }catch(e){ return; }
  const c=alertColor(d.type||"bias");
  document.getElementById("popup-icon").textContent = alertIcon(d.type||"bias");
  document.getElementById("popup-type").textContent = "注意喚起";
  document.getElementById("popup-type").style.color = c;
  document.getElementById("popup-msg").textContent = d.msg||d.alertMsg||"";
  const btn=document.getElementById("popup-btn");
  if(btn){
    btn.style.background = c;
    btn.style.color = "#fff";
    if(d.topicId){
      btn.onclick = function(){ closePopup(); goTopic(d.topicId); };
      btn.style.display = "";
    } else {
      btn.style.display = "none";
    }
  }
  document.getElementById("popup-overlay").classList.add("show");
}
function closePopup(){ document.getElementById("popup-overlay").classList.remove("show"); }

// ===== 検索 =====
function toggleFilter(type, value){
  if(type==='cat'){
    const idx=state.filters.cats.indexOf(value);
    if(idx>=0) state.filters.cats.splice(idx,1);
    else state.filters.cats.push(value);
  } else if(type==='types'){
    if(!state.filters.types) state.filters.types=[];
    const idx=state.filters.types.indexOf(value);
    if(idx>=0) state.filters.types.splice(idx,1);
    else state.filters.types.push(value);
  } else {
    state.filters[type] = state.filters[type]===value ? '' : value;
  }
  render();
}

function clearFilters(){
  state.filters = { cats:[], types:[], trust:"", period:"", alert:"" };
  render();
}

function getFilteredSources(){
  const q = state.searchQuery.toLowerCase();
  const f = state.filters;
  return ALL_SOURCES.filter(s=>{
    // キーワード検索（タイトル・発行元・カテゴリ・要約）
    if(q && !s.title.toLowerCase().includes(q) &&
       !s.org.toLowerCase().includes(q) &&
       !s.cat.toLowerCase().includes(q) &&
       !(s.summary||'').toLowerCase().includes(q)) return false;
    // カテゴリフィルター
    if(f.cats.length>0 && !f.cats.includes(s.cat)) return false;
    // ソース種別
    if(f.types && f.types.length>0 && !f.types.includes(s.type)) return false;
    // 信頼度
    if(f.trust==='high' && s.score<90) return false;
    if(f.trust==='mid' && (s.score<50||s.score>=90)) return false;
    if(f.trust==='low' && s.score>=50) return false;
    // 期間
    if(f.period && s.period!==f.period) return false;
    // 注意喚起
    if(f.alert==='yes' && !s.alert) return false;
    if(f.alert==='no' && s.alert) return false;
    return true;
  }).sort((a,b)=>b.score-a.score);
}

function hasActiveFilter(){
  const f=state.filters;
  return f.cats.length>0||(f.types&&f.types.length>0)||f.trust||f.period||f.alert;
}

function renderFilterTags(){
  const p=P(), f=state.filters;
  const TAG_GROUPS = [
    { type:'cat',    label:'分野',     values: CATEGORIES.map(c=>c.label) },
    { type:'types',  label:'種別',     values:['政府機関','公共放送','主要紙','学術'] },
    { type:'trust',  label:'信頼度',   values:[{v:'high',l:'高信頼90+'},{v:'mid',l:'要確認50-89'},{v:'low',l:'注意-49'}] },
    { type:'period', label:'期間',     values:[{v:'today',l:'今日'},{v:'week',l:'今週'},{v:'month',l:'今月'},{v:'year',l:'今年'}] },
    { type:'alert',  label:'注意喚起', values:[{v:'yes',l:'⚠あり'},{v:'no',l:'なし'}] },
  ];
  const activeCount = (f.cats.length) + (f.types?f.types.length:0) + (f.trust?1:0) + (f.period?1:0) + (f.alert?1:0);
  return `<div style="padding:8px 14px 4px;border-bottom:1px solid #0f1a2e">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:10px;color:#555;letter-spacing:1px">絞り込み</span>
      ${activeCount>0?`<button onclick="clearFilters()" style="padding:2px 10px;background:transparent;border:1px solid #333;border-radius:99px;font-size:10px;color:#888;cursor:pointer;font-family:'Noto Sans JP',sans-serif">× ${activeCount}件クリア</button>`:''}
    </div>
    ${TAG_GROUPS.map(g=>{
      const tags = g.values.map(v=>{
        const val = typeof v==='object'?v.v:v;
        const lbl = typeof v==='object'?v.l:v;
        let active;
        if(g.type==='cat') active=f.cats.includes(val);
        else if(g.type==='types') active=f.types&&f.types.includes(val);
        else active=f[g.type]===val;
        const bc = active?p.brand:'#1a2a4a';
        const tc = active?p.brand:'#aaa';
        const bg = active?p.brand+'22':'#0c1525';
        return `<button onclick="toggleFilter('${g.type}','${val}')" style="flex-shrink:0;padding:5px 12px;background:${bg};border:1px solid ${bc};border-radius:99px;font-size:11px;color:${tc};cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif">${active?'✓ ':''}${lbl}</button>`;
      }).join('');
      return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:7px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch">
        <span style="font-size:10px;color:#444;flex-shrink:0;min-width:40px;padding-right:4px">${g.label}</span>
        <div style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex:1">${tags}</div>
      </div>`;
    }).join('')}
  </div>`;
}

  if(!state.searched && state.searchFocused){
    return renderSearchFocused(p);
  }

  // 検索前：通常の検索画面
  if(!state.searched){
    return renderSearchEmpty(p);

  // 検索後 Phase1：結果一覧
  if(state.searchPhase !== 'detail'){

function renderTimelineTab(){
  var p = P();
  var currentTopic = FACT_TOPICS.find(function(t){ return t.id === (state.currentTopicId||'hakamada_muzai'); }) || FACT_TOPICS[0];
  var currentData = TOPIC_DATA[currentTopic.id] || TOPIC_DATA['hakamada_muzai'];
  var items = (currentData && currentData.timeline) || [];
  if(state.timelineOrder === undefined) state.timelineOrder = 'asc';
  var ordered = state.timelineOrder === 'desc' ? items.slice().reverse() : items;
  var alertItems = items.filter(function(x){ return x.alert; }).length;
  var span = items.length > 0 ? (items[items.length-1].date.slice(0,4) - items[0].date.slice(0,4)) : 0;

  var header = '<div style="background:#0c1525;border:1px solid #1a2a4a;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">' +
    '<div style="font-size:12px;color:#555">' + items.length + '件' + (span>0 ? '・' + span + '年間（' + items[0].date.slice(0,4) + '〜' + items[items.length-1].date.slice(0,4) + '年）' : '') + '</div>' +
    '<div style="display:flex;gap:6px">' +
    '<button onclick="state.timelineOrder=\"asc\";render()" style="padding:4px 10px;border-radius:99px;border:1px solid ' + (state.timelineOrder==='asc'?p.brand:'#1a2a4a') + ';background:' + (state.timelineOrder==='asc'?p.brand+'22':'transparent') + ';color:' + (state.timelineOrder==='asc'?p.brand:'#555') + ';font-size:11px;cursor:pointer;font-family:sans-serif">古い順</button>' +
    '<button onclick="state.timelineOrder=\"desc\";render()" style="padding:4px 10px;border-radius:99px;border:1px solid ' + (state.timelineOrder==='desc'?p.brand:'#1a2a4a') + ';background:' + (state.timelineOrder==='desc'?p.brand+'22':'transparent') + ';color:' + (state.timelineOrder==='desc'?p.brand:'#555') + ';font-size:11px;cursor:pointer;font-family:sans-serif">新しい順</button>' +
    '</div></div>';

  var legend = '<div style="display:flex;gap:12px;margin-bottom:14px">' +
    '<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:50%;background:' + p.brand + '"></div><span style="font-size:11px;color:#555">通常</span></div>' +
    (alertItems>0 ? '<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:50%;background:' + p.warn + '"></div><span style="font-size:11px;color:#555">注意喚起あり</span></div>' : '') +
    '</div>';

  var rows = ordered.map(function(item, i){
    var isLatest = state.timelineOrder==='desc' ? i===0 : i===ordered.length-1;
    var dotColor = item.alert ? p.warn : p.brand;
    var alertBox = item.alert && state.sensitivity>=2 ?
      '<div style="background:' + p.warn + '11;border:1px solid ' + p.warn + '33;border-radius:8px;padding:8px 10px;margin-top:8px;display:flex;align-items:flex-start;gap:8px">' +
      '<span style="font-size:12px;flex-shrink:0">📰</span>' +
      '<div style="font-size:11px;color:' + p.warn + ';line-height:1.6">' + item.msg + '</div></div>' : '';

    return '<div style="display:flex;gap:12px;margin-bottom:16px">' +
      '<div style="display:flex;flex-direction:column;align-items:center;padding-top:4px;flex-shrink:0">' +
      '<div style="width:10px;height:10px;border-radius:50%;background:' + dotColor + ';flex-shrink:0;position:relative">' +
      (isLatest ? '<div style="position:absolute;top:-3px;left:-3px;width:16px;height:16px;border-radius:50%;background:' + dotColor + '33;"></div>' : '') +
      '</div>' +
      (i<ordered.length-1 ? '<div style="width:1px;flex:1;background:#1a2a4a;margin-top:4px;min-height:20px"></div>' : '') +
      '</div>' +
      '<div style="flex:1;padding-bottom:8px">' +
      '<div style="font-size:13px;font-weight:700;color:' + dotColor + ';margin-bottom:4px">' + item.date + (isLatest?' <span style="font-size:10px;background:'+dotColor+'22;border:1px solid '+dotColor+'44;padding:1px 6px;border-radius:99px;margin-left:4px">最新</span>':'') + '</div>' +
      '<div style="font-size:13px;color:#ccc;line-height:1.7">' + item.event + '</div>' +
      alertBox +
      '</div></div>';
  }).join('');

  return header + legend + rows;
}

// ===== イベント =====
function bindEvents(){
  const hs=document.getElementById("home-search");
  if(hs){ hs.addEventListener("input",e=>state.searchQuery=e.target.value); hs.addEventListener("keydown",e=>e.key==="Enter"&&doSearch()); }
  // main-search は廃止（ホーム検索窓に統一）
}

function doSearch(){
  const hs=document.getElementById("home-search");
  const ss=document.getElementById("search-input");
  if(hs) state.searchQuery=hs.value;
  if(ss) state.searchQuery=ss.value;
  if(!state.searchQuery.trim()) return;
  // 履歴に追加（重複除去・最大10件）
  state.history = [state.searchQuery, ...state.history.filter(h=>h!==state.searchQuery)].slice(0,10);
  state.searched=true;
  state.searchTab=0;
  state.searchPhase='results';
  state.currentTopicId=null;
  state.currentTopicId=null;
  switchNav("search");
}

function setTab(i){ state.searchTab=i; render(); }
function setSearchQuery(q){
  state.searchQuery=q;
  state.history=[q,...state.history.filter(h=>h!==q)].slice(0,10);
  state.searched=true;
  state.searchTab=0;
  // タイトルからIDを逆引き
  var matched = FACT_TOPICS.find(function(t){ return t.title===q; });
  state.currentTopicId = matched ? matched.id : null;
  state.searchPhase = matched ? 'detail' : 'results';
  switchNav('search');
}

function goTopic(topicId){
  var t = FACT_TOPICS.find(function(x){ return x.id===topicId; });
  if(!t) return;
  state.currentTopicId = topicId;
  state.searchQuery = t.title;
  state.history=[t.title,...state.history.filter(h=>h!==t.title)].slice(0,10);
  state.searched = true;
  state.searchTab = 0;
  state.searchPhase = 'detail';
  switchNav('search');
  render();
}
function setExploreDepth(d){ state.exploreDepth=d; if(d===0){state.selectedCat=null;state.selectedSub=null;} render(); }
function selectCat(id){ state.selectedCat=CATEGORIES.find(c=>c.id===id); state.exploreDepth=1; state.selectedSub=null; render(); }
function selectSub(i,label){ state.selectedSub={label}; state.exploreDepth=2; render(); }
function updateSensitivity(v){
  state.sensitivity=Number(v);
  const levels=["最小","低め","標準","高め","最大"];
  const descs=["科学的に完全否定された情報のみ表示します","明確な誤情報と政府公式と大きく矛盾する情報を表示します","標準：主要メディア間の論調の乖離も含めて表示します","専門家見解との軽微な差異も表示します","すべての不確実性・未確認情報に反応します"];
  const sl=document.getElementById("sens-label");
  const sd=document.getElementById("sens-desc");
  if(sl) sl.textContent=`Lv.${v} — ${levels[v-1]}`;
  if(sd) sd.textContent=descs[v-1];
  document.getElementById("sens-badge").textContent=`感度 Lv.${v}`;
}

function focusSearch(){
  state.searchFocused = true;
  render();
  setTimeout(()=>{
    const el = document.getElementById('search-input-focused');
    if(el){ el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 30);
}

function blurSearch(){
  state.searchFocused = false;
  render();
}

function refocusSearch(id){
  setTimeout(()=>{
    const el = document.getElementById(id);
    if(el){ el.focus(); el.setSelectionRange(el.value.length, el.value.length); }

function fromHistoryFocused(query){

function clearSearch(){

          <div style="font-size:13px;font-weight:600;color:#ddd;margin-bottom:4px">${a.title||''}</div>
          <div style="font-size:11px;color:#555;margin-bottom:6px">📅 ${a.date||''}</div>
          ${a.url ? `<button onclick="openUrl(decodeURIComponent(this.dataset.u))" data-u="${encodeURIComponent(a.url)}" style="font-size:11px;color:${p.brand};background:${p.brand}15;border:1px solid ${p.brand}44;padding:3px 10px;border-radius:99px;cursor:pointer">記事を読む ↗</button>` : ''}
        </div>`).join('')}
    </div>` : ''}

    <div style="display:flex;gap:8px;margin-bottom:16px">
      ${url ? `<a href="${url}" target="_blank" style="flex:1;text-decoration:none">
        <div style="background:${p.brand}22;border:1px solid ${p.brand}44;border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:13px;font-weight:700;color:${p.brand};margin-bottom:2px">元記事を読む →</div>
          <div style="font-size:10px;color:#555">${s.org}</div>
        </div>
      </a>` : ''}
      <div style="flex:1;background:#1a2a4a22;border:1px solid #1a2a4a;border-radius:10px;padding:12px;text-align:center;cursor:pointer" onclick="switchNav('explore')">
        <div style="font-size:13px;font-weight:700;color:#4a9eff;margin-bottom:2px">🗄️ 記録を閲覧 →</div>
        <div style="font-size:10px;color:#555">カテゴリを見る</div>
      </div>
    </div>

  </div>`;
}

function navExplore(){
  if(state.nav !== "explore"){
    // 他画面から探索へ：現在の深さを維持
    switchNav("explore");
    return;
  }
  // 探索画面内：1階層戻る
  if(state.exploreDepth === 2){
    state.exploreDepth = 1;
    state.selectedSub = null;
    render();
    flashNav("explore");
  } else if(state.exploreDepth === 1){
    state.exploreDepth = 0;
    state.selectedCat = null;
    state.selectedSub = null;
    render();
    flashNav("explore");
  } else {
    // すでにトップ：軽くフラッシュして「ここがトップ」を伝える
    flashNav("explore");
  }
}

function flashNav(navId){
  const btn = document.querySelector(`.nav-btn[data-nav="${navId}"]`);
  if(!btn) return;
  btn.style.background = "rgba(74,158,255,0.15)";
  setTimeout(()=>{ btn.style.background = ""; }, 200);
}

function updateColorMode(mode){
  state.colorMode=mode;
  applyColorMode();
  render();
}
function applyColorMode(){
  const p=P();
  document.documentElement.style.setProperty('--brand', p.brand);
  // モノクロ時はbodyにfilterをかけない（記号で区別するため）
  const label = {normal:'標準',protanopia:'P型/D型（赤緑）',tritanopia:'T型（青黄）',mono:'モノクローム'}[state.colorMode]||'標準';
  const badge=document.getElementById('color-mode-badge');
  if(badge) badge.textContent=state.colorMode==='normal'?'':' | '+label;
}

// 初期描画
render();
</script>
</body>
</html>
