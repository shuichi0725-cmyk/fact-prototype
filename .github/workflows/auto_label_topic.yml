name: Auto Label Topic Registration

on:
  issues:
    types: [opened]

jobs:
  label:
    if: contains(github.event.issue.title, '[TOPICç”³è«‹]') || contains(github.event.issue.title, '[UPDATEç”³è«‹]')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Add topic-registration label
        if: contains(github.event.issue.title, '[TOPICç”³è«‹]')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['topic-registration']
            });

      - name: Add update-request label
        if: contains(github.event.issue.title, '[UPDATEç”³è«‹]')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['update-request']
            });
